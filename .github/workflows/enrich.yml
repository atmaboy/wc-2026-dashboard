name: Scorer Enrichment (15 min)
# Runs every 15 minutes independently of the full refresh.
# Picks up any FINISHED matches that still have empty goals[] and fills
# them from API-Football (api-sports.io), which provides full goal-event
# detail (scorer, minute, type) for World Cup 2026 on its free tier.
#
# HISTORY (2026-07): previously enriched from TheSportsDB, then from
# football-data.org's per-match endpoint — both were verified via curl to
# NOT return usable goal-scorer data for World Cup 2026 on their free
# tiers. Switched to API-Football, whose free plan (100 req/day) includes
# full event data for this competition (league=1, season=2026).
#
# /api/enrich now processes the entire backlog in a single call — it
# fetches the full fixture list once, then batches up to 20 fixtures per
# request, so a full backlog of ~80 matches costs only ~6 requests. No
# looping needed; a single curl is enough. Safe to run even when nothing
# needs enriching (returns done:true immediately).

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Scorer enrichment via /api/enrich
        run: |
          RAW_URL="${{ secrets.VERCEL_APP_URL }}"
          BASE_URL=$(echo "$RAW_URL" | sed 's|/$||' | sed 's|^http://|https://|')
          ENRICH_URL="${BASE_URL}/api/enrich"

          echo "Hitting: ${ENRICH_URL}"

          response=$(curl -s -o /tmp/enrich_body.txt -w "%{http_code}" -L --max-redirs 5 "${ENRICH_URL}")
          echo "Response code: $response"
          cat /tmp/enrich_body.txt

          if [ "$response" != "200" ]; then
            echo "Enrichment failed with status $response"
            exit 1
          fi

          echo "Enrichment run complete."