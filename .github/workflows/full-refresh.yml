name: Full Refresh (Hourly)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  full-refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger full refresh via /api/cron
        run: |
          RAW_URL="${{ secrets.VERCEL_APP_URL }}"
          BASE_URL=$(echo "$RAW_URL" | sed 's|/$||' | sed 's|^http://|https://|')
          echo "Hitting: ${BASE_URL}/api/cron"
          response=$(curl -s -o /tmp/cron_body.txt -w "%{http_code}" \
            -L --max-redirs 5 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${BASE_URL}/api/cron")
          echo "Response code: $response"
          cat /tmp/cron_body.txt
          if [ "$response" != "200" ]; then
            echo "Full refresh failed with status $response"
            exit 1
          fi

      # Scorer enrichment via API-Football — single call handles the
      # whole backlog (see app/api/enrich/route.ts for details).
      - name: Scorer enrichment via /api/enrich
        run: |
          RAW_URL="${{ secrets.VERCEL_APP_URL }}"
          BASE_URL=$(echo "$RAW_URL" | sed 's|/$||' | sed 's|^http://|https://|')
          ENRICH_URL="${BASE_URL}/api/enrich"

          echo "Hitting: ${ENRICH_URL}"
          body=$(curl -s -L --max-redirs 5 "${ENRICH_URL}")
          echo "$body"